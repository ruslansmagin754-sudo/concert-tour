<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивный тур по концертной площадке</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .tour-container {
            position: relative;
            max-width: 1000px;
            width: 95%;
            aspect-ratio: 16 / 9; /* Задает правильное соотношение сторон */
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 2px solid #333;
        }
        .tour-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.4s ease-in-out;
        }
        /* Стили для точек-маркеров */
        .marker {
            position: absolute;
            width: 24px;
            height: 24px;
            background-color: #ff0055;
            border-radius: 50%;
            cursor: pointer;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 0 0 rgba(255, 0, 85, 0.7);
            animation: pulse 1.5s infinite;
            transition: transform 0.2s ease;
        }
        .marker:hover {
            transform: translate(-50%, -50%) scale(1.3);
            background-color: #fff;
        }
        /* Подсказка при наведении на маркер */
        .marker::after {
            content: attr(data-title);
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0,0,0,0.8);
            color: #fff;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }
        .marker:hover::after {
            opacity: 1;
        }
        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 0, 85, 0.7);
            }
            70% {
                box-shadow: 0 0 0 15px rgba(255, 0, 85, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(255, 0, 85, 0);
            }
        }
        /* Кнопка "Назад" */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            border: 1px solid #fff;
            border-radius: 5px;
            cursor: pointer;
            display: none;
            font-weight: bold;
            transition: background 0.3s;
            z-index: 10;
        }
        .back-btn:hover {
            background-color: #ff0055;
            border-color: #ff0055;
        }
    </style>
</head>
<body>

    <h2 style="margin-bottom: 20px;">Исследуйте нашу концертную площадку</h2>

    <div class="tour-container">
        <button class="back-btn" id="backBtn" onclick="goBack()">← Назад к общему плану</button>
        
        <img id="mainImage" class="tour-image" src="./main.jpg" alt="Общий план площадки">

        <div class="marker" id="marker-scene" style="top: 62%; left: 50%;" data-title="Сцена" onclick="changeZone('scene.jpg')"></div>
        <div class="marker" id="marker-rightb" style="top: 55%; left: 80%;" data-title="Правый балкон" onclick="changeZone('rightb.jpg')"></div>
        <div class="marker" id="marker-leftb" style="top: 55%; left: 20%;" data-title="Левый балкон" onclick="changeZone('leftb.jpg')"></div>
        <div class="marker" id="marker-vip" style="top: 80%; left: 50%;" data-title="VIP-ложа" onclick="changeZone('vip.jpg')"></div>
        <div class="marker" id="marker-bar" style="top: 65%; left: 72%;" data-title="Барная зона" onclick="changeZone('bar.jpg')"></div>
    </div>

    <script>
        // Добавили ./ к переменной главного фото
        const mainPhoto = './main.jpg'; 
        const imgElement = document.getElementById('mainImage');
        const backBtn = document.getElementById('backBtn');
        const markers = document.querySelectorAll('.marker');

        function changeZone(imageSrc) {
            // Плавное исчезновение
            imgElement.style.opacity = 0;
            
            setTimeout(() => {
                // Меняем картинку, принудительно добавляя относительный путь
                imgElement.src = './' + imageSrc;
                imgElement.style.opacity = 1;
                
                // Скрываем маркеры и показываем кнопку "Назад"
                markers.forEach(m => m.style.display = 'none');
                backBtn.style.display = 'block';
            }, 400);
        }

        function goBack() {
            imgElement.style.opacity = 0;
            
            setTimeout(() => {
                imgElement.src = mainPhoto;
                imgElement.style.opacity = 1;
                
                // Возвращаем маркеры, убираем кнопку "Назад"
                markers.forEach(m => m.style.display = 'block');
                backBtn.style.display = 'none';
            }, 400);
        }
    </script>

</body>
</html>
